<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DD2D4A"/>
      <stop offset="50%" stop-color="#FF9F1C"/>
      <stop offset="100%" stop-color="#FB5607"/>
    </linearGradient>
    <linearGradient id="road" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00F5D4"/>
      <stop offset="100%" stop-color="#5BC0EB"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="512" height="512" rx="96" fill="#090b14"/>
  <!-- Road network lines -->
  <path d="M 100 420 L 256 180 L 412 420" stroke="url(#road)" stroke-width="18" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
  <path d="M 80 320 L 432 320" stroke="url(#road)" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.2"/>
  <!-- Central pulse/road line -->
  <path d="M 256 100 L 256 420" stroke="url(#road)" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.4"/>
  <!-- Dashed center line -->
  <path d="M 256 120 L 256 400" stroke="#00F5D4" stroke-width="4" fill="none" stroke-dasharray="20 16" stroke-linecap="round" opacity="0.7"/>
  <!-- Pothole detection pulse rings -->
  <circle cx="256" cy="280" r="50" stroke="#FB5607" stroke-width="4" fill="none" opacity="0.5"/>
  <circle cx="256" cy="280" r="80" stroke="#FB5607" stroke-width="2" fill="none" opacity="0.25"/>
  <!-- Central pothole dot -->
  <circle cx="256" cy="280" r="18" fill="url(#bg)"/>
  <circle cx="256" cy="280" r="7" fill="white"/>
  <!-- RP text -->
  <text x="256" y="460" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="60" fill="url(#bg)" letter-spacing="8">RP</text>
</svg>